<div class="pickup-locations-container">
    <h1>Pickup Locations Management</h1>
    
    <div class="tab-actions">
        <button class="btn btn-primary" onclick="showAddPickupAddressModal()">Add Pickup Location</button>
    </div>
    
    <div class="data-table">
        <table id="pickupAddressesTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Address</th>
                    <th>Instructions</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="5" style="text-align: center; padding: 20px; color: #666;">
                        Loading pickup locations...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
