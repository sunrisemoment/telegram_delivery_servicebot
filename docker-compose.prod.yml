services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-deliver}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: ./api
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-deliver}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PUBLISH_PORT:-8000}:8000"
    volumes:
      - api_uploads:/app/static/uploads
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  bot:
    profiles: ["bot"]
    build: ./bot
    env_file:
      - .env.prod
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped
    command: python -m app.main

volumes:
  pgdata:
  api_uploads:
