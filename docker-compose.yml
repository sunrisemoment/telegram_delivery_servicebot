version: "3.8"
services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    depends_on:
      - api
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot --email admin@example.com --agree-tos --no-eff-email -d yourdomain.com

  api:
    build: ./api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./api:/app
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  bot:
    build: ./bot
    env_file: .env
    depends_on:
      - db
      - api
    volumes:
      - ./bot:/app
    restart: unless-stopped
    command: python -m app.main

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: deliver
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.py:/docker-entrypoint-initdb.d/init_db.py

  worker:
    build: ./api
    env_file: .env
    depends_on:
      - db
    command: python -m scripts.export_csv_worker

volumes:
  pgdata: